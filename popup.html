<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Script to Prompt Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .container {
      padding: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
      min-height: 80px;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    #output {
      background-color: #f9fafb;
      color: #1f2937;
      line-height: 1.6;
      min-height: 100px;
    }

    .input-section {
      margin-bottom: 16px;
    }

    .output-section {
      margin-top: 20px;
      display: none;
    }

    .output-section.show {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-secondary {
      padding: 10px 16px;
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
      border-color: #d1d5db;
    }

    .btn-secondary.success {
      background: #d1fae5;
      color: #065f46;
      border-color: #6ee7b7;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 12px;
      color: #6b7280;
      font-size: 13px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      display: none;
      padding: 12px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      margin-top: 12px;
    }

    .error.show {
      display: block;
    }

    .examples {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .examples-title {
      font-size: 12px;
      color: #6b7280;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .example {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: #4b5563;
    }

    .example:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    .footer {
      padding: 16px 20px;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Settings Section */
    .settings-section {
      margin-bottom: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f9fafb;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .settings-header:hover {
      background: #f3f4f6;
    }

    .toggle-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
    }

    .settings-content {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      display: block;
    }

    .settings-content.hidden {
      display: none;
    }

    .api-key-input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .api-key-input-group input {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Monaco', 'Courier New', monospace;
      transition: border-color 0.2s;
    }

    .api-key-input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .toggle-visibility-btn {
      padding: 8px 12px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    .toggle-visibility-btn:hover {
      background: #e5e7eb;
    }

    .api-key-hint {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .api-key-hint a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .api-key-hint a:hover {
      text-decoration: underline;
    }

    .btn-save {
      width: 100%;
      padding: 10px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:hover {
      background: #059669;
    }

    .btn-save:active {
      transform: scale(0.98);
    }

    .save-status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    .save-status.success {
      color: #10b981;
    }

    .save-status.error {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 Video Prompt Converter</h1>
    <p>Turn your ideas into AI-ready prompts</p>
  </div>

  <div class="container">
    <!-- Settings Section -->
    <div id="settingsSection" class="settings-section">
      <div class="settings-header">
        <span>⚙️ Settings</span>
        <button id="toggleSettings" class="toggle-btn">−</button>
      </div>
      <div id="settingsContent" class="settings-content">
        <label for="apiKeyInput">OpenRouter API Key:</label>
        <div class="api-key-input-group">
          <input
            type="password"
            id="apiKeyInput"
            placeholder="sk-or-v1-..."
            autocomplete="off"
          >
          <button id="toggleApiKey" class="toggle-visibility-btn" title="Show/Hide API Key">👁️</button>
        </div>
        <div class="api-key-hint">
          Get your free API key at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a>
        </div>
        <button id="saveApiKey" class="btn-save">💾 Save API Key</button>
        <div id="saveStatus" class="save-status"></div>
      </div>
    </div>
    <div class="input-section">
      <label for="input">Your video idea:</label>
      <textarea
        id="input"
        placeholder="例如：一个女孩在咖啡馆看书，下午阳光很好

Or: A girl reading in a cafe with beautiful afternoon light"
      ></textarea>
      <button id="convertBtn" class="btn-primary">Convert to Prompt</button>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>Generating your prompt...</div>
    </div>

    <div id="error" class="error"></div>

    <div id="outputSection" class="output-section">
      <label for="output">AI-ready prompt:</label>
      <textarea id="output" readonly></textarea>
      <div class="action-buttons">
        <button id="copyBtn" class="btn-secondary">📋 Copy</button>
        <a href="https://seed2video.com" target="_blank" class="btn-secondary">🎥 Seed2Video</a>
      </div>
    </div>

    <div class="examples">
      <div class="examples-title">Quick examples (click to try):</div>
      <div class="example" data-text="一个女孩在咖啡馆看书，下午阳光很好">
        一个女孩在咖啡馆看书，下午阳光很好
      </div>
      <div class="example" data-text="夜晚的城市街道，雨中霓虹灯反射">
        夜晚的城市街道，雨中霓虹灯反射
      </div>
      <div class="example" data-text="一只猫在窗台上晒太阳">
        一只猫在窗台上晒太阳
      </div>
    </div>
  </div>

  <div class="footer">
    Powered by DeepSeek AI • Optimized for <a href="https://seed2video.com" target="_blank">Seed2Video</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
